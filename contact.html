<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Sony WH-1000XM5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Même base que précédemment */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        :root { --sony-blue:#0066cc; --sony-gray:#f5f5f5; --shadow:0 8px 20px rgba(0,0,0,0.08); }
        body { background:var(--sony-gray); }
        header, nav, footer { background: linear-gradient(145deg, #0a0a0a, #1a1a1a, #002244); color:white; }
        .header-inner { max-width:1300px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; }
        .logo-sony { height:42px; filter:brightness(0) invert(1); }
        nav { display:flex; justify-content:center; gap:0.4rem; padding:0.5rem 2rem 1rem; border-top:1px solid rgba(255,255,255,0.1); }
        nav a { color:#ddd; text-decoration:none; padding:0.5rem 1rem; border-radius:40px; }
        nav a:hover, nav a.active { background:var(--sony-blue); color:white; }
        main { max-width:1300px; margin:2rem auto; padding:0 2rem; }
        .contact-hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1583394838336-acd977736f90?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; color:white; text-align:center; padding:4rem 2rem; border-radius:40px; margin-bottom:2rem;
        }
        .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin:3rem 0; }
        .contact-info { background:white; border-radius:32px; padding:2.5rem; box-shadow:var(--shadow); }
        .contact-info h3 { font-size:2rem; margin-bottom:1.5rem; position:relative; }
        .contact-info h3::after { content:''; width:70px; height:4px; background:var(--sony-blue); display:block; margin-top:8px; }
        .contact-item { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
        .contact-icon { width:50px; height:50px; background:var(--sony-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:1.3rem; }
        .form-container { background:white; border-radius:32px; padding:2.5rem; box-shadow:var(--shadow); }
        .form-group { margin-bottom:1.5rem; }
        label { font-weight:600; display:block; margin-bottom:0.3rem; }
        input, textarea, select { width:100%; padding:0.8rem 1rem; border:1px solid #ddd; border-radius:16px; }
        button { background:var(--sony-blue); color:white; border:none; padding:1rem 2rem; border-radius:40px; font-weight:600; cursor:pointer; transition:0.2s; }
        button:hover { background:#004c99; }
        footer { background:#0c0c0c; color:#aaa; text-align:center; padding:2.5rem; margin-top:3rem; }
        .social-icons { display:flex; justify-content:center; gap:1.8rem; margin-top:1.5rem; }
        .social-icons a { color:#aaa; font-size:1.6rem; }
        .social-icons a:hover { color:var(--sony-blue); }
        @media (max-width:800px){ .contact-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <header>
        <div class="header-inner"><img class="logo-sony" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Sony_logo.svg/1024px-Sony_logo.svg.png" alt="Sony"><h1 style="color:white;">Contact</h1></div>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="caracteristiques.html">Caractéristiques</a>
            <a href="galerie.html">Galerie</a>
            <a href="histoire.html">Histoire</a>
            <a href="utilisation.html">Utilisation</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="about.html">À propos</a>
            <a href="Nous.html">Membres</a>
        </nav>
    </header>
    <main>
        <section class="contact-hero"><h2 style="font-size:3rem;">Contactez-nous</h2><p>Une question ? L'équipe Sony XM5 vous répond.</p></section>
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Informations</h3>
                <div class="contact-item"><div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>1 Rue Sony, 105 Antananarivo</div>
                <div class="contact-item"><div class="contact-icon"><i class="fas fa-phone"></i></div>+261 34 78 139 26</div>
                <div class="contact-item"><div class="contact-icon"><i class="fas fa-envelope"></i></div>tanjonaaina559@gmail.com</div>
                <div class="contact-item"><div class="contact-icon"><i class="fas fa-clock"></i></div>Lun-Ven 9h-18h</div>
            </div>
            <div class="form-container">
                <h3>Écrivez-nous</h3>
                <form onsubmit="alert('Message envoyé (simulation)'); return false;">
                    <div class="form-group"><label>Nom</label><input type="text" required></div>
                    <div class="form-group"><label>Email</label><input type="email" required></div>
                    <div class="form-group"><label>Sujet</label><select><option>Support</option><option>Vente</option><option>Garantie</option></select></div>
                    <div class="form-group"><label>Message</label><textarea rows="4" required></textarea></div>
                    <button type="submit"><i class="fas fa-paper-plane"></i> Envoyer</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Projet étudiant</p><div class="social-icons"><a href="#"><i class="fab fa-facebook"></i></a><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-instagram"></i></a></div>
    </footer>
</body>
</html>
